name: listener
description: "CopyPaste v2 — Clipboard listener plugin (native per OS)."
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  core:
    path: ../core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: ListenerPlugin
      macos:
        pluginClass: ListenerPlugin
      windows:
        pluginClass: ListenerPluginCApi
