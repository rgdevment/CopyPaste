name: app
description: "CopyPaste v2 — Flutter desktop clipboard manager."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core
  listener:
    path: ../listener
  super_clipboard: ^0.8.0
  tray_manager: ^0.2.0
  hotkey_manager: ^0.2.0
  window_manager: ^0.4.0
  flutter_acrylic: ^1.0.0
  flutter_animate: ^4.0.0
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/icon_app_256.png
    - assets/icons/icon_tray_32.png
    - assets/icons/icon_tray_64.png
    - assets/icons/icon_notification.png

  # generate: true  # enable when adding l10n/app_en.arb
