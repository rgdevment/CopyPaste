output: dist/

releases:
  - name: windows-standalone
    jobs:
      - name: build-exe
        package:
          platform: windows
          target: exe
          build_args:
            dart-define:
              STORE_BUILD: "false"

  - name: windows-store
    jobs:
      - name: build-msix
        package:
          platform: windows
          target: msix
          build_args:
            dart-define:
              STORE_BUILD: "true"

  - name: linux-appimage
    jobs:
      - name: build-appimage
        package:
          platform: linux
          target: appimage

  - name: linux-deb
    jobs:
      - name: build-deb
        package:
          platform: linux
          target: deb

  - name: linux-rpm
    jobs:
      - name: build-rpm
        package:
          platform: linux
          target: rpm
