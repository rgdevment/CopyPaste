output: dist

releases:
  - name: windows-standalone
    jobs:
      - name: build-exe
        package:
          platform: windows
          target: exe
          build_args:
            dart-define:
              STORE_BUILD: "false"

  - name: windows-store
    jobs:
      - name: build-msix
        package:
          platform: windows
          target: msix
          build_args:
            dart-define:
              STORE_BUILD: "true"
