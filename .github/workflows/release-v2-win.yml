name: Release v2 (Windows)

on:
  push:
    tags:
      - "v2.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to use (e.g. 2.1.0). Defaults to 2.0.0-dev"
        required: false
        default: "2.0.0-dev"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    name: Build & Release Windows

    env:
      PFX_BASE64: ${{ secrets.PFX_BASE64 }}
      PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $version = "${{ github.event.inputs.version }}"
          } elseif ($env:GITHUB_REF -match 'refs/tags/v2\.(.+)') {
            $version = "2.$($matches[1])"
          } else {
            $version = "2.0.0"
          }

          $isPrerelease = if ($version -match '-') { 'true' } else { 'false' }
          $baseVersion = $version -replace '-.*', ''
          $parts = $baseVersion.Split('.')
          $version4 = switch ($parts.Count) {
            1 { "$baseVersion.0.0.0" }
            2 { "$baseVersion.0.0" }
            3 { "$baseVersion.0" }
            default { $baseVersion }
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION4=$version4" >> $env:GITHUB_OUTPUT
          echo "IS_PRERELEASE=$isPrerelease" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version  (MSIX: $version4)  (PreRelease: $isPrerelease)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Get dependencies
        run: cd v2/app && flutter pub get

      - name: Build standalone (exe installer)
        shell: pwsh
        run: |
          Push-Location v2/app
          fastforge package `
            --platform windows `
            --targets exe `
            --build-dart-define "STORE_BUILD=false" `
            --build-dart-define "APP_VERSION=${{ steps.get_version.outputs.VERSION }}"
          Pop-Location

      - name: Decode signing certificate
        if: env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:PFX_BASE64)
          Set-Content -Path signingCert.pfx -Value $bytes -AsByteStream

      - name: Sign standalone installer
        if: env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $PWD 'signingCert.pfx'
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { Write-Error "Signtool not found"; exit 1 }

          $distDir = "v2/app/dist"
          Get-ChildItem -Path $distDir -Include *.exe -Recurse | ForEach-Object {
            & $signtool.FullName sign /f $pfxPath /p $env:PFX_PASSWORD `
              /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }

      - name: Rename standalone installer
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $distDir = "v2/app/dist"
          $setup = Get-ChildItem -Path $distDir -Recurse -Filter "*-setup.exe" | Select-Object -First 1
          if ($setup) {
            $newName = "CopyPaste_${version}_x64_Setup.exe"
            $newPath = Join-Path $setup.DirectoryName $newName
            Move-Item -Path $setup.FullName -Destination $newPath
            Write-Host "Renamed to: $newName"
          }

      - name: Build store MSIX
        if: steps.get_version.outputs.IS_PRERELEASE != 'true'
        shell: pwsh
        run: |
          Push-Location v2/app
          fastforge package `
            --platform windows `
            --targets msix `
            --build-dart-define "STORE_BUILD=true" `
            --build-dart-define "APP_VERSION=${{ steps.get_version.outputs.VERSION }}"
          Pop-Location

      - name: Rename store MSIX
        if: steps.get_version.outputs.IS_PRERELEASE != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $distDir = "v2/app/dist"
          $msix = Get-ChildItem -Path $distDir -Recurse -Filter "*.msix" | Select-Object -First 1
          if ($msix) {
            $newName = "CopyPaste_${version}_x64_store.msix"
            $newPath = Join-Path $msix.DirectoryName $newName
            Move-Item -Path $msix.FullName -Destination $newPath
            Write-Host "Renamed to: $newName"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: v2/app/dist/
          retention-days: 5

  github-release:
    runs-on: ubuntu-latest
    needs: release-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10
    name: Create GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Extract tag message
        id: tag_message
        run: |
          MSG=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_message.outputs.TAG_BODY }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*_Setup.exe
            artifacts/**/*_store.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-appcast:
    runs-on: ubuntu-latest
    needs: github-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 5
    name: Update Appcast

    steps:
      - name: Generate and update appcast Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          RELEASE=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name | startswith("v2.")) | select(.draft | not)] | sort_by(.published_at) | reverse | .[0]')

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          VERSION=${TAG#v}
          DATE=$(echo "$RELEASE" | jq -r '.published_at')
          ASSET_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("_Setup.exe")) | .browser_download_url')

          if [ -z "$ASSET_URL" ]; then
            echo "No Setup.exe asset found in release $TAG, skipping appcast update"
            exit 0
          fi

          ASSET_SIZE=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("_Setup.exe")) | .size')
          PUB_DATE=$(date -d "$DATE" -R)

          cat > /tmp/appcast.xml << 'APPCAST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>CopyPaste</title>
              <description>CopyPaste update feed</description>
              <language>en</language>
              <item>
                <title>CopyPaste APPCAST_VERSION_PLACEHOLDER</title>
                <pubDate>APPCAST_PUBDATE_PLACEHOLDER</pubDate>
                <enclosure
                  url="APPCAST_URL_PLACEHOLDER"
                  sparkle:version="APPCAST_VERSION_PLACEHOLDER"
                  sparkle:os="windows"
                  type="application/octet-stream"
                  length="APPCAST_SIZE_PLACEHOLDER" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          sed -i 's/^          //' /tmp/appcast.xml
          sed -i "s|APPCAST_VERSION_PLACEHOLDER|${VERSION}|g" /tmp/appcast.xml
          sed -i "s|APPCAST_PUBDATE_PLACEHOLDER|${PUB_DATE}|g" /tmp/appcast.xml
          sed -i "s|APPCAST_URL_PLACEHOLDER|${ASSET_URL}|g" /tmp/appcast.xml
          sed -i "s|APPCAST_SIZE_PLACEHOLDER|${ASSET_SIZE}|g" /tmp/appcast.xml

          jq -n --arg content "$(cat /tmp/appcast.xml)" \
            '{"files":{"appcast.xml":{"content":$content}}}' | \
            gh api --method PATCH "/gists/${{ vars.APPCAST_GIST_ID }}" --input -
