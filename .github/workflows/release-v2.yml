name: Release v2

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    name: Build & Release Windows

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v2\.(.+)') {
            $version = "2.$($matches[1])"
          } else {
            $version = "2.0.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: cd v2/app && flutter pub get

      - name: Build Windows (Release)
        run: cd v2/app && flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: v2/app/build/windows/x64/runner/Release/
          retention-days: 5

  release-macos:
    runs-on: macos-latest
    if: false   # activar cuando Fase 7 esté lista
    timeout-minutes: 30
    name: Build & Release macOS

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: cd v2/app && flutter pub get

      - name: Build macOS (Release)
        run: cd v2/app && flutter build macos --release

      # TODO: notarización → subir artifact

  release-linux:
    runs-on: ubuntu-latest
    if: false   # activar cuando Fase 8 esté lista
    timeout-minutes: 30
    name: Build & Release Linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: cd v2/app && flutter pub get

      - name: Build Linux (Release)
        run: cd v2/app && flutter build linux --release

      # TODO: generar .deb y .AppImage → subir artifacts

  github-release:
    runs-on: ubuntu-latest
    needs: release-windows
    timeout-minutes: 10
    name: Create GitHub Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
