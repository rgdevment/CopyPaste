name: Release v2 (macOS)

on:
    push:
        tags:
            - "v2.*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to use (e.g. 2.1.0). Defaults to 2.0.0-dev"
                required: false
                default: "2.0.0-dev"

permissions:
    contents: write

jobs:
    build-macos:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-15
                      arch: arm64
                      flutter_arch: arm64
                      label: Apple Silicon
                    - runner: macos-13
                      arch: x86_64
                      flutter_arch: x64
                      label: Intel

        runs-on: ${{ matrix.runner }}
        timeout-minutes: 45
        name: Build macOS (${{ matrix.label }})

        env:
            MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
            MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
            APPLE_ID: ${{ secrets.APPLE_ID }}
            APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
            APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract version from tag
              id: get_version
              run: |
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                  elif [[ "$GITHUB_REF" =~ refs/tags/v2\.(.+) ]]; then
                    VERSION="2.${BASH_REMATCH[1]}"
                  else
                    VERSION="2.0.0"
                  fi

                  IS_PRERELEASE="false"
                  if [[ "$VERSION" == *-* ]]; then
                    IS_PRERELEASE="true"
                  fi

                  BUILD_NAME="${VERSION%-*}"
                  BUILD_NUMBER=$(echo "$BUILD_NAME" | awk -F. '{printf "%d%03d%03d", $1, $2, $3}')

                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_OUTPUT"
                  echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
                  echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION  Build: $BUILD_NAME ($BUILD_NUMBER)  PreRelease: $IS_PRERELEASE"

            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - name: Cache pub dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.pub-cache
                  key: ${{ runner.os }}-${{ matrix.arch }}-pub-${{ hashFiles('**/pubspec.yaml') }}
                  restore-keys: ${{ runner.os }}-${{ matrix.arch }}-pub-

            - name: Get dependencies
              run: |
                  cd v2/core && flutter pub get
                  cd ../listener && flutter pub get
                  cd ../app && flutter pub get

            - name: Update pubspec version
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"
                  sed -i '' "s/^version:.*/version: $VERSION/" v2/app/pubspec.yaml
                  echo "Updated pubspec.yaml version to: $VERSION"

            # ── Code Signing Setup ──
            - name: Import signing certificate
              if: env.MACOS_CERTIFICATE_P12 != ''
              run: |
                  KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
                  KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  CERT_PATH="$RUNNER_TEMP/certificate.p12"
                  echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

                  security import "$CERT_PATH" \
                    -k "$KEYCHAIN_PATH" \
                    -P "$MACOS_CERTIFICATE_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/security

                  security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
                  security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  rm -f "$CERT_PATH"
                  echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
                  echo "Certificate imported successfully"

            # ── Build ──
            - name: Build macOS release
              run: |
                  cd v2/app
                  flutter build macos --release \
                    --build-name="${{ steps.get_version.outputs.BUILD_NAME }}" \
                    --build-number="${{ steps.get_version.outputs.BUILD_NUMBER }}" \
                    --dart-define="APP_VERSION=${{ steps.get_version.outputs.VERSION }}"

            # ── Code Sign the .app ──
            - name: Sign application
              if: env.MACOS_CERTIFICATE_P12 != ''
              run: |
                  APP_PATH="v2/app/build/macos/Build/Products/Release/CopyPaste.app"

                  codesign --deep --force --options runtime \
                    --entitlements "v2/app/macos/Runner/Release.entitlements" \
                    --sign "Developer ID Application" \
                    "$APP_PATH"

                  echo "Verifying signature..."
                  codesign --verify --deep --strict "$APP_PATH"
                  echo "Signature verified"

            - name: Ad-hoc sign (unsigned build)
              if: env.MACOS_CERTIFICATE_P12 == ''
              run: |
                  APP_PATH="v2/app/build/macos/Build/Products/Release/CopyPaste.app"
                  codesign --deep --force --sign - "$APP_PATH"
                  echo "Ad-hoc signed (unsigned build)"

            # ── Create DMG ──
            - name: Install create-dmg
              run: brew install create-dmg

            - name: Create DMG
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"
                  ARCH="${{ matrix.arch }}"
                  APP_PATH="v2/app/build/macos/Build/Products/Release/CopyPaste.app"
                  DMG_NAME="CopyPaste_${VERSION}_${ARCH}.dmg"

                  mkdir -p v2/app/dist

                  create-dmg \
                    --volname "CopyPaste" \
                    --volicon "v2/app/macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png" \
                    --window-pos 200 120 \
                    --window-size 660 400 \
                    --icon-size 80 \
                    --icon "CopyPaste.app" 180 190 \
                    --app-drop-link 480 190 \
                    --hide-extension "CopyPaste.app" \
                    --no-internet-enable \
                    "v2/app/dist/$DMG_NAME" \
                    "$APP_PATH" \
                    || true

                  # create-dmg exits 2 when it can't set the volicon (common in CI)
                  # Verify the DMG was actually created
                  if [[ ! -f "v2/app/dist/$DMG_NAME" ]]; then
                    echo "::error::DMG was not created"
                    exit 1
                  fi

                  echo "DMG created: $DMG_NAME ($(du -h "v2/app/dist/$DMG_NAME" | cut -f1))"

            # ── Sign & Notarize DMG ──
            - name: Sign DMG
              if: env.MACOS_CERTIFICATE_P12 != ''
              run: |
                  DMG_PATH="v2/app/dist/CopyPaste_${{ steps.get_version.outputs.VERSION }}_${{ matrix.arch }}.dmg"
                  codesign --force --sign "Developer ID Application" "$DMG_PATH"
                  codesign --verify "$DMG_PATH"
                  echo "DMG signed"

            - name: Notarize DMG
              if: env.APPLE_ID != '' && env.MACOS_CERTIFICATE_P12 != ''
              run: |
                  DMG_PATH="v2/app/dist/CopyPaste_${{ steps.get_version.outputs.VERSION }}_${{ matrix.arch }}.dmg"

                  echo "Submitting for notarization..."
                  xcrun notarytool submit "$DMG_PATH" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_APP_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait \
                    --timeout 600

                  echo "Stapling notarization ticket..."
                  xcrun stapler staple "$DMG_PATH"

                  echo "Verifying notarization..."
                  spctl --assess --type open --context context:primary-signature "$DMG_PATH"
                  echo "Notarization complete"

            # ── Cleanup ──
            - name: Cleanup keychain
              if: always() && env.KEYCHAIN_PATH != ''
              run: security delete-keychain "$KEYCHAIN_PATH" || true

            # ── Upload ──
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-macos-${{ matrix.arch }}
                  path: v2/app/dist/*.dmg
                  retention-days: 5

    github-release:
        runs-on: ubuntu-latest
        needs: build-macos
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        name: Create GitHub Release

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref_name }}

            - name: Download arm64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-macos-arm64
                  path: artifacts

            - name: Download x86_64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-macos-x86_64
                  path: artifacts

            - name: Create or update GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  make_latest: true
                  files: artifacts/*.dmg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

