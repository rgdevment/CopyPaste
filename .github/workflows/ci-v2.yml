name: CI v2

on:
  push:
    branches: [main]
    paths: ["v2/**"]
  pull_request:
    branches: [main]
    paths: ["v2/**"]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Analyze & Test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: |
          cd v2/core && flutter pub get
          cd ../listener && flutter pub get
          cd ../app && flutter pub get

      - name: Analyze
        run: |
          cd v2/core && flutter analyze
          cd ../app && flutter analyze

      - name: Run tests
        run: |
          cd v2/core && flutter test
          cd ../app && flutter test

  build-windows:
    runs-on: windows-latest
    needs: analyze
    name: Build Windows

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: cd v2/app && flutter pub get

      - name: Build Windows (Release)
        run: cd v2/app && flutter build windows --release
