name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    name: Build & Test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore v1/CopyPaste.slnx -p:Platform=x64

      - name: Lint (Check format)
        run: dotnet format v1/CopyPaste.slnx --verify-no-changes --no-restore

      - name: Build Solution (Release)
        run: dotnet build v1/CopyPaste.slnx -c Release -p:Platform=x64 --no-restore

      - name: Run Tests
        run: dotnet test v1/CopyPaste.slnx -c Release -p:Platform=x64 --no-build --verbosity normal --logger "console;verbosity=detailed"

  sonarcloud:
    name: SonarCloud
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarScanner Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ vars.SONAR_PROJECT_KEY }}"
          /o:"${{ vars.SONAR_ORGANIZATION }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.cs.opencover.reportsPaths="v1/coverage/core/**/coverage.opencover.xml,v1/coverage/listener/**/coverage.opencover.xml,v1/coverage/ui/**/coverage.opencover.xml"
          /d:sonar.dotnet.excludeTestProjects=true
          /d:sonar.exclusions="**/obj/**,**/bin/**,**/AssemblyInfo.cs,**/GlobalSuppressions.cs,**/*.xaml,**/Assets/**,**/Localization/Languages/**,v1/CopyPaste.Launcher/**"
          /d:sonar.coverage.exclusions="**/AssemblyInfo.cs,**/GlobalSuppressions.cs,**/App.xaml.cs,**/*Window.xaml.cs,**/*Window.cs,**/*Panel.cs,**/Win32WindowHelper.cs,**/HotkeyHelper.cs,**/ClipboardFilterChipsHelper.cs,**/WindowsClipboardListener.cs,**/ClipboardHelper.cs,**/CopyPasteEngine.cs,**/FocusHelper.cs,**/WindowsThumbnailExtractor.cs"

      - name: Restore dependencies
        run: dotnet restore v1/CopyPaste.slnx -p:Platform=x64

      - name: Build Solution
        run: dotnet build v1/CopyPaste.slnx -c Debug -p:Platform=x64 -p:DeterministicSourcePaths=false --no-restore

      - name: Run Tests with Coverage
        run: |
          dotnet test v1/Tests/CopyPaste.Core.Tests/ -c Debug -p:Platform=x64 --no-build `
            --collect:"XPlat Code Coverage" --results-directory v1/coverage/core `
            --settings v1/coverage.core.runsettings
          dotnet test v1/Tests/CopyPaste.Listener.Tests/ -c Debug -p:Platform=x64 --no-build `
            --collect:"XPlat Code Coverage" --results-directory v1/coverage/listener `
            --settings v1/coverage.listener.runsettings
          dotnet test v1/Tests/CopyPaste.UI.Tests/ -c Debug -p:Platform=x64 --no-build `
            --collect:"XPlat Code Coverage" --results-directory v1/coverage/ui `
            --settings v1/coverage.ui.runsettings

      - name: SonarScanner End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
