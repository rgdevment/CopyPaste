name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to use (e.g. 2.1.0). Defaults to 2.0.0-dev"
                required: false
                default: "2.0.0-dev"

permissions:
    contents: write

jobs:
    extract-version:
        runs-on: ubuntu-latest
        name: Extract Version
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
        steps:
            - name: Resolve version
              id: get_version
              run: |
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                  elif [[ "$GITHUB_REF" =~ refs/tags/v(.+) ]]; then
                    VERSION="${BASH_REMATCH[1]}"
                  else
                    VERSION="2.0.0"
                  fi
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: $VERSION"

    build-windows:
        needs: extract-version
        uses: ./.github/workflows/release-win.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    build-macos:
        needs: extract-version
        uses: ./.github/workflows/release-mac.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    build-linux:
        needs: extract-version
        uses: ./.github/workflows/release-linux.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    github-release:
        runs-on: ubuntu-latest
        needs: [extract-version, build-windows, build-macos, build-linux]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        name: Create GitHub Release

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract tag message
              id: tag_message
              run: |
                  MSG=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
                  echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Download all artifacts
              uses: actions/download-artifact@v7
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.tag_message.outputs.TAG_BODY }}
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  make_latest: true
                  files: |
                      artifacts/release-windows/**/*_Setup.exe
                      artifacts/release-windows/**/*_store.msix*
                      artifacts/release-macos/*.dmg
                      artifacts/release-linux/*.AppImage
                      artifacts/release-linux/*.AppImage.zsync
                      artifacts/release-linux/*.deb
                      artifacts/release-linux/*.rpm
                      artifacts/release-linux/*.tar.gz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish-release-manifest:
        runs-on: ubuntu-latest
        needs: github-release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        name: Sign and publish release-manifest.json

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - name: Resolve dependencies
              working-directory: app
              run: flutter pub get

            - name: Inject Microsoft Store productId
              env:
                  STORE_APP_ID: ${{ vars.STORE_APP_ID }}
              run: |
                  if [ -z "$STORE_APP_ID" ]; then
                    echo "vars.STORE_APP_ID is not set" >&2
                    exit 1
                  fi
                  sed -i "s|ms-windows-store://pdp/?productid=PLACEHOLDER|ms-windows-store://pdp/?productid=${STORE_APP_ID}|" release-manifest.json
                  grep -q "productid=${STORE_APP_ID}" release-manifest.json

            - name: Override latest, URLs and standard release notes
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"
                  REPO="${{ github.repository }}"
                  RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

                  SEVERITY=$(jq -r '.severity // "recommended"' release-manifest.json)
                  SUMMARY_EN="CopyPaste ${TAG} (${SEVERITY} update). See release notes for details."
                  SUMMARY_ES="CopyPaste ${TAG} (actualización ${SEVERITY}). Consulta las notas de la versión."

                  jq \
                    --arg version "$VERSION" \
                    --arg url "$RELEASE_URL" \
                    --arg sum_en "$SUMMARY_EN" \
                    --arg sum_es "$SUMMARY_ES" \
                    '.latest = $version
                     | .releaseNotes.en.summary = $sum_en
                     | .releaseNotes.en.url = $url
                     | .releaseNotes.es.summary = $sum_es
                     | .releaseNotes.es.url = $url' \
                    release-manifest.json > release-manifest.tmp.json
                  mv release-manifest.tmp.json release-manifest.json

                  echo "--- Final manifest to publish ---"
                  cat release-manifest.json

            - name: Sign manifest
              working-directory: app
              env:
                  RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
              run: |
                  if [ -z "$RELEASE_PRIVATE_KEY" ]; then
                    echo "RELEASE_PRIVATE_KEY secret is not set" >&2
                    exit 1
                  fi
                  printf '%s' "$RELEASE_PRIVATE_KEY" | dart run tools/sign_manifest.dart \
                    ../release-manifest.json \
                    ../release-manifest.json.sig

            - name: Upload manifest assets to release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "${{ github.ref_name }}" \
                    release-manifest.json \
                    release-manifest.json.sig \
                    --clobber

    publish-to-store:
        runs-on: windows-latest
        needs: [extract-version, github-release]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(needs.extract-version.outputs.version, '-')
        timeout-minutes: 15
        name: Publish to Microsoft Store

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Install Microsoft Store Developer CLI
              uses: microsoft/microsoft-store-apppublisher@v1.3

            - name: Download Windows artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-windows
                  path: artifacts/windows

            - name: Find MSIX package
              id: find_msix
              shell: bash
              run: |
                  MSIX=$(find artifacts/windows -name "*.msixupload" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msixbundle" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msix" | head -1)
                  if [ -z "$MSIX" ]; then
                    echo "Error: No MSIX package found in release-windows artifact"
                    find artifacts/windows -type f
                    exit 1
                  fi
                  echo "MSIX_PATH=$MSIX" >> $GITHUB_OUTPUT
                  echo "Found: $MSIX"

            - name: Configure Microsoft Store CLI
              shell: bash
              run: |
                  msstore reconfigure \
                    --tenantId "${{ secrets.STORE_TENANT_ID }}" \
                    --sellerId "${{ secrets.STORE_SELLER_ID }}" \
                    --clientId "${{ secrets.STORE_CLIENT_ID }}" \
                    --clientSecret "${{ secrets.STORE_CLIENT_SECRET }}"

            - name: Publish to Microsoft Store
              shell: bash
              run: |
                  msstore publish "${{ steps.find_msix.outputs.MSIX_PATH }}" \
                    --appId "${{ vars.STORE_APP_ID }}"

    update-homebrew-cask:
        runs-on: ubuntu-latest
        needs: github-release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        name: Update Homebrew Tap

        steps:
            - name: Update Homebrew Tap
              env:
                  GH_TOKEN: ${{ secrets.GIST_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"

                  DMG_NAME="CopyPaste_${VERSION}_universal.dmg"
                  DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DMG_NAME}"

                  DEB_NAME="CopyPaste_${VERSION}_amd64.deb"
                  DEB_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DEB_NAME}"

                  echo "Downloading DMG to compute SHA256..."
                  curl -fSL -o "/tmp/${DMG_NAME}" "${DMG_URL}"
                  DMG_SHA256=$(sha256sum "/tmp/${DMG_NAME}" | awk '{print $1}')
                  rm -f "/tmp/${DMG_NAME}"

                  echo "Downloading deb to compute SHA256..."
                  curl -fSL -o "/tmp/${DEB_NAME}" "${DEB_URL}"
                  DEB_SHA256=$(sha256sum "/tmp/${DEB_NAME}" | awk '{print $1}')
                  rm -f "/tmp/${DEB_NAME}"

                  echo "Version: ${VERSION}"
                  echo "DMG SHA256: ${DMG_SHA256}"
                  echo "DEB SHA256: ${DEB_SHA256}"

                  if [[ "$VERSION" == *-* ]]; then
                    CASK_FILE="Casks/copypaste-beta.rb"
                    CASK_NAME="copypaste-beta"
                    CASK_DESC="Clipboard history manager for macOS (beta)"
                    FORMULA_FILE="Formula/copypaste-beta.rb"
                    FORMULA_CLASS="CopypasteBeta"
                  else
                    CASK_FILE="Casks/copypaste.rb"
                    CASK_NAME="copypaste"
                    CASK_DESC="Clipboard history manager for macOS"
                    FORMULA_FILE="Formula/copypaste.rb"
                    FORMULA_CLASS="Copypaste"
                  fi

                  git clone "https://x-access-token:${GH_TOKEN}@github.com/rgdevment/homebrew-tap.git" /tmp/homebrew-tap
                  cd /tmp/homebrew-tap

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  mkdir -p Casks Formula

                  cat > "${CASK_FILE}" <<- CASK_EOF
                  	cask "${CASK_NAME}" do
                  	  version "${VERSION}"
                  	  sha256 "${DMG_SHA256}"

                  	  url "${DMG_URL}"
                  	  name "CopyPaste"
                  	  desc "${CASK_DESC}"
                  	  homepage "https://github.com/${{ github.repository }}"

                  	  depends_on macos: ">= :ventura"

                  	  app "CopyPaste.app"

                  	  zap trash: [
                  	    "~/Library/Application Support/com.rgdevment.copypaste",
                  	  ]
                  	end
                  CASK_EOF

                  cat > "${FORMULA_FILE}" <<- FORMULA_EOF
                  	class ${FORMULA_CLASS} < Formula
                  	  desc "Clipboard history manager"
                  	  homepage "https://github.com/${{ github.repository }}"
                  	  version "${VERSION}"

                  	  on_linux do
                  	    url "${DEB_URL}"
                  	    sha256 "${DEB_SHA256}"
                  	  end

                  	  bottle :unneeded

                  	  def install
                  	    system "ar", "x", cached_download
                  	    system "tar", "xf", Dir["data.tar.*"].first
                  	    libexec.install Dir["opt/copypaste/*"]
                  	    bin.write_exec_script libexec/"copypaste"
                  	  end

                  	  def caveats
                  	    "Requires an X11 session. On Wayland, global hotkey and auto-paste are unavailable."
                  	  end

                  	  test do
                  	    assert_predicate bin/"copypaste", :exist?
                  	  end
                  	end
                  FORMULA_EOF

                  git add "${CASK_FILE}" "${FORMULA_FILE}"
                  git commit -m "Update ${CASK_NAME} and Linux formula to ${VERSION}"
                  git push origin main

                  echo "Homebrew Tap updated: cask ${CASK_NAME} and formula ${FORMULA_FILE} → ${VERSION}"
