name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to use (e.g. 2.1.0). Defaults to 2.0.0-dev"
                required: false
                default: "2.0.0-dev"

permissions:
    contents: write

jobs:
    extract-version:
        runs-on: ubuntu-latest
        name: Extract Version
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
        steps:
            - name: Resolve version
              id: get_version
              run: |
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                  elif [[ "$GITHUB_REF" =~ refs/tags/v(.+) ]]; then
                    VERSION="${BASH_REMATCH[1]}"
                  else
                    VERSION="2.0.0"
                  fi
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: $VERSION"

    build-windows:
        needs: extract-version
        uses: ./.github/workflows/release-win.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    build-macos:
        needs: extract-version
        uses: ./.github/workflows/release-mac.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    build-linux:
        needs: extract-version
        uses: ./.github/workflows/release-linux.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    github-release:
        runs-on: ubuntu-latest
        needs: [extract-version, build-windows, build-macos, build-linux]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        name: Create GitHub Release

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract tag message
              id: tag_message
              run: |
                  MSG=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
                  echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Download all artifacts
              uses: actions/download-artifact@v7
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.tag_message.outputs.TAG_BODY }}
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  make_latest: true
                  files: |
                      artifacts/release-windows/**/*_Setup.exe
                      artifacts/release-windows/**/*_store.msix*
                      artifacts/release-macos/*.dmg
                      artifacts/release-linux/*.AppImage
                      artifacts/release-linux/*.deb
                      artifacts/release-linux/*.rpm
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    update-appcast:
        runs-on: ubuntu-latest
        needs: github-release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        name: Update Appcast

        steps:
            - name: Generate and update appcast Gist
              env:
                  GH_TOKEN: ${{ secrets.GIST_TOKEN }}
              run: |
                  RELEASE=$(gh api repos/${{ github.repository }}/releases \
                    --jq '[.[] | select(.tag_name | startswith("v")) | select(.draft | not)] | sort_by(.published_at) | reverse | .[0]')

                  TAG=$(echo "$RELEASE" | jq -r '.tag_name')
                  VERSION=${TAG#v}
                  DATE=$(echo "$RELEASE" | jq -r '.published_at')
                  ASSET_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("_Setup.exe")) | .browser_download_url')

                  if [ -z "$ASSET_URL" ]; then
                    echo "No Setup.exe asset found in release $TAG, skipping appcast update"
                    exit 0
                  fi

                  ASSET_SIZE=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("_Setup.exe")) | .size')
                  PUB_DATE=$(date -d "$DATE" -R)

                  cat > /tmp/appcast.xml << 'APPCAST_EOF'
                  <?xml version="1.0" encoding="utf-8"?>
                  <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
                    <channel>
                      <title>CopyPaste</title>
                      <description>CopyPaste update feed</description>
                      <language>en</language>
                      <item>
                        <title>CopyPaste APPCAST_VERSION_PLACEHOLDER</title>
                        <pubDate>APPCAST_PUBDATE_PLACEHOLDER</pubDate>
                        <enclosure
                          url="APPCAST_URL_PLACEHOLDER"
                          sparkle:version="APPCAST_VERSION_PLACEHOLDER"
                          sparkle:os="windows"
                          type="application/octet-stream"
                          length="APPCAST_SIZE_PLACEHOLDER" />
                      </item>
                    </channel>
                  </rss>
                  APPCAST_EOF

                  sed -i 's/^          //' /tmp/appcast.xml
                  sed -i "s|APPCAST_VERSION_PLACEHOLDER|${VERSION}|g" /tmp/appcast.xml
                  sed -i "s|APPCAST_PUBDATE_PLACEHOLDER|${PUB_DATE}|g" /tmp/appcast.xml
                  sed -i "s|APPCAST_URL_PLACEHOLDER|${ASSET_URL}|g" /tmp/appcast.xml
                  sed -i "s|APPCAST_SIZE_PLACEHOLDER|${ASSET_SIZE}|g" /tmp/appcast.xml

                  jq -n --arg content "$(cat /tmp/appcast.xml)" \
                    '{"files":{"appcast.xml":{"content":$content}}}' | \
                    gh api --method PATCH "/gists/${{ vars.APPCAST_GIST_ID }}" --input -

    publish-to-store:
        runs-on: windows-latest
        needs: [extract-version, github-release]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(needs.extract-version.outputs.version, '-')
        timeout-minutes: 15
        name: Publish to Microsoft Store

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract tag message
              id: tag_message
              shell: bash
              run: |
                  MSG=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
                  echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Install Microsoft Store Developer CLI
              uses: microsoft/microsoft-store-apppublisher@v1.3

            - name: Download Windows artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-windows
                  path: artifacts/windows

            - name: Find MSIX package
              id: find_msix
              shell: bash
              run: |
                  MSIX=$(find artifacts/windows -name "*.msixupload" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msixbundle" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msix" | head -1)
                  if [ -z "$MSIX" ]; then
                    echo "Error: No MSIX package found in release-windows artifact"
                    find artifacts/windows -type f
                    exit 1
                  fi
                  echo "MSIX_PATH=$MSIX" >> $GITHUB_OUTPUT
                  echo "Found: $MSIX"

            - name: Configure Microsoft Store CLI
              shell: bash
              run: |
                  msstore reconfigure \
                    --tenantId "${{ secrets.STORE_TENANT_ID }}" \
                    --sellerId "${{ secrets.STORE_SELLER_ID }}" \
                    --clientId "${{ secrets.STORE_CLIENT_ID }}" \
                    --clientSecret "${{ secrets.STORE_CLIENT_SECRET }}"

            - name: Upload package (draft, no commit)
              shell: bash
              run: |
                  msstore publish "${{ steps.find_msix.outputs.MSIX_PATH }}" \
                    --appId "${{ vars.STORE_APP_ID }}" \
                    --noCommit

            - name: Update release notes
              shell: bash
              env:
                  STORE_NOTES: ${{ steps.tag_message.outputs.TAG_BODY }}
              run: |
                  msstore submission get "${{ vars.STORE_APP_ID }}" > store_metadata.json

                  python3 << 'PYEOF'
                  import json, os, re, sys

                  raw = os.environ.get('STORE_NOTES', '').strip()
                  notes = re.sub(r'^#{1,6}\s*', '', raw, flags=re.MULTILINE)
                  notes = re.sub(r'\*{1,3}(.+?)\*{1,3}', r'\1', notes, flags=re.DOTALL)
                  notes = re.sub(r'_{1,2}(.+?)_{1,2}', r'\1', notes, flags=re.DOTALL)
                  notes = re.sub(r'`([^`]+)`', r'\1', notes)
                  notes = re.sub(r'\n{3,}', '\n\n', notes).strip()[:1500]

                  try:
                      with open('store_metadata.json') as f:
                          data = json.load(f)
                  except Exception as e:
                      print(f'Warning: could not parse submission metadata: {e}', file=sys.stderr)
                      sys.exit(0)

                  found = False
                  for lk in ('listings', 'Listings'):
                      listings = data.get(lk)
                      if not isinstance(listings, dict):
                          continue
                      print(f'Found listings for locales: {list(listings.keys())}')
                      for locale, listing in listings.items():
                          for bk in ('baseListing', 'BaseListing'):
                              base = listing.get(bk)
                              if not isinstance(base, dict):
                                  continue
                              for rk in ('releaseNotes', 'ReleaseNotes', 'whatsNew', 'WhatsNew'):
                                  if rk in base and notes:
                                      base[rk] = notes
                                      found = True
                                      print(f"  [{locale}] Updated '{rk}' ({len(notes)} chars)")

                  if not found:
                      print(f'Note: no releaseNotes field matched. Top-level keys: {list(data.keys())}')

                  with open('store_metadata_updated.json', 'w') as f:
                      json.dump(data, f)
                  PYEOF

                  msstore submission updateMetadata "${{ vars.STORE_APP_ID }}" \
                    "$(cat store_metadata_updated.json)"

            - name: Commit submission
              shell: bash
              run: msstore submission publish "${{ vars.STORE_APP_ID }}"

    update-homebrew-cask:
        runs-on: ubuntu-latest
        needs: github-release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        name: Update Homebrew Tap

        steps:
            - name: Update Homebrew Tap
              env:
                  GH_TOKEN: ${{ secrets.GIST_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"

                  DMG_NAME="CopyPaste_${VERSION}_universal.dmg"
                  DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DMG_NAME}"

                  DEB_NAME="CopyPaste_${VERSION}_amd64.deb"
                  DEB_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DEB_NAME}"

                  echo "Downloading DMG to compute SHA256..."
                  curl -fSL -o "/tmp/${DMG_NAME}" "${DMG_URL}"
                  DMG_SHA256=$(sha256sum "/tmp/${DMG_NAME}" | awk '{print $1}')
                  rm -f "/tmp/${DMG_NAME}"

                  echo "Downloading deb to compute SHA256..."
                  curl -fSL -o "/tmp/${DEB_NAME}" "${DEB_URL}"
                  DEB_SHA256=$(sha256sum "/tmp/${DEB_NAME}" | awk '{print $1}')
                  rm -f "/tmp/${DEB_NAME}"

                  echo "Version: ${VERSION}"
                  echo "DMG SHA256: ${DMG_SHA256}"
                  echo "DEB SHA256: ${DEB_SHA256}"

                  if [[ "$VERSION" == *-* ]]; then
                    CASK_FILE="Casks/copypaste-beta.rb"
                    CASK_NAME="copypaste-beta"
                    CASK_DESC="Clipboard history manager for macOS (beta)"
                    FORMULA_FILE="Formula/copypaste-beta.rb"
                    FORMULA_CLASS="CopypasteBeta"
                  else
                    CASK_FILE="Casks/copypaste.rb"
                    CASK_NAME="copypaste"
                    CASK_DESC="Clipboard history manager for macOS"
                    FORMULA_FILE="Formula/copypaste.rb"
                    FORMULA_CLASS="Copypaste"
                  fi

                  git clone "https://x-access-token:${GH_TOKEN}@github.com/rgdevment/homebrew-tap.git" /tmp/homebrew-tap
                  cd /tmp/homebrew-tap

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  mkdir -p Casks Formula

                  cat > "${CASK_FILE}" <<- CASK_EOF
                  	cask "${CASK_NAME}" do
                  	  version "${VERSION}"
                  	  sha256 "${DMG_SHA256}"

                  	  url "${DMG_URL}"
                  	  name "CopyPaste"
                  	  desc "${CASK_DESC}"
                  	  homepage "https://github.com/${{ github.repository }}"

                  	  depends_on macos: ">= :ventura"

                  	  app "CopyPaste.app"

                  	  zap trash: [
                  	    "~/Library/Application Support/com.rgdevment.copypaste",
                  	  ]
                  	end
                  CASK_EOF

                  cat > "${FORMULA_FILE}" <<- FORMULA_EOF
                  	class ${FORMULA_CLASS} < Formula
                  	  desc "Clipboard history manager"
                  	  homepage "https://github.com/${{ github.repository }}"
                  	  version "${VERSION}"

                  	  on_linux do
                  	    url "${DEB_URL}"
                  	    sha256 "${DEB_SHA256}"
                  	  end

                  	  bottle :unneeded

                  	  def install
                  	    system "ar", "x", cached_download
                  	    system "tar", "xf", Dir["data.tar.*"].first
                  	    libexec.install Dir["opt/copypaste/*"]
                  	    bin.write_exec_script libexec/"copypaste"
                  	  end

                  	  def caveats
                  	    "Requires an X11 session. On Wayland, global hotkey and auto-paste are unavailable."
                  	  end

                  	  test do
                  	    assert_predicate bin/"copypaste", :exist?
                  	  end
                  	end
                  FORMULA_EOF

                  git add "${CASK_FILE}" "${FORMULA_FILE}"
                  git commit -m "Update ${CASK_NAME} and Linux formula to ${VERSION}"
                  git push origin main

                  echo "Homebrew Tap updated: cask ${CASK_NAME} and formula ${FORMULA_FILE} → ${VERSION}"
