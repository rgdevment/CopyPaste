name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [win-x64]

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PUBLISH_PATH: CopyPaste.UI/bin/Release/net10.0-windows10.0.22621.0/${{ matrix.arch }}/publish
      PFX_BASE64: ${{ secrets.PFX_BASE64 }}
      PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            $version = $matches[1]
          } else {
            $version = "1.0.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version extracted: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore CopyPaste.UI/CopyPaste.UI.csproj -r ${{ matrix.arch }}

      - name: Lint (Check format)
        run: dotnet format --verify-no-changes --no-restore

      - name: Publish (${{ matrix.arch }})
        run: |
          dotnet publish CopyPaste.UI/CopyPaste.UI.csproj `
            -c Release `
            -r ${{ matrix.arch }} `
            --self-contained true `
            --no-restore `
            -p:PublishAot=true `
            -p:IlcOptimizationPreference=Speed `
            -p:TrimMode=partial

      - name: Clean unnecessary files
        shell: pwsh
        run: |
          $targetDir = (Resolve-Path "${{ env.PUBLISH_PATH }}").Path
          
          # Remove all language folders except 'en' and 'en-US'
          Get-ChildItem -Path $targetDir -Directory | Where-Object {
            $_.Name -match '^[a-z]{2}(-[A-Za-z]{2,4})?$' -and 
            $_.Name -notin @('en', 'en-US')
          } | Remove-Item -Recurse -Force
          
          # Remove PDB files (debug symbols)
          Get-ChildItem -Path $targetDir -Filter "*.pdb" -Recurse | Remove-Item -Force
          
          # Remove unnecessary DLLs (ML/AI components not used)
          $unnecessaryDlls = @(
            "onnxruntime.dll",
            "DirectML.dll",
            "Microsoft.Windows.Widgets.dll",
            "Microsoft.DiaSymReader.Native.amd64.dll"
          )
          foreach ($dll in $unnecessaryDlls) {
            $path = Join-Path $targetDir $dll
            if (Test-Path $path) {
              Remove-Item $path -Force
              Write-Host "Removed: $dll"
            }
          }
          
          # Remove WinMD files (only needed for development)
          Get-ChildItem -Path $targetDir -Filter "*.winmd" -Recurse | Remove-Item -Force
          
          # Remove unnecessary json files
          Get-ChildItem -Path $targetDir -Filter "*.deps.json" -Recurse | Remove-Item -Force
          Get-ChildItem -Path $targetDir -Filter "*.runtimeconfig.json" -Recurse | Remove-Item -Force
          
          # Calculate final size
          $totalSize = (Get-ChildItem -Path $targetDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Final publish size: $([math]::Round($totalSize, 2)) MB"
          Write-Host "File count: $((Get-ChildItem -Path $targetDir -Recurse -File).Count)"

      - name: Decode signing certificate
        if: env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:PFX_BASE64)
          Set-Content -Path signingCert.pfx -Value $bytes -AsByteStream

      - name: Sign App Binaries
        if: env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $PWD 'signingCert.pfx'

          # Find latest x64 version of signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -like "*x64*" } | Sort-Object FullName -Descending | Select-Object -First 1

          if (-not $signtool) { Write-Error "Signtool not found"; exit 1 }
          Write-Host "Using Signtool: $($signtool.FullName)"

          $targetDir = (Resolve-Path "${{ env.PUBLISH_PATH }}").Path
          Get-ChildItem -Path $targetDir -Include *.exe,*.dll -Recurse | ForEach-Object {
            & $signtool.FullName sign /f $pfxPath /p $env:PFX_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }

      - name: Create Portable Zip
        shell: pwsh
        run: |
          $targetDir = (Resolve-Path "${{ env.PUBLISH_PATH }}").Path
          Compress-Archive -Path "$targetDir/*" -DestinationPath "CopyPaste-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}-portable.zip" -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build Installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          $fullPath = Join-Path "${{ github.workspace }}" "${{ env.PUBLISH_PATH }}"
          $publishDir = (Resolve-Path $fullPath).Path

          $repoRoot = "${{ github.workspace }}"
          $myArch = if ("${{ matrix.arch }}" -eq "win-x64") { "x64" } else { "x86" }
          $version = "${{ steps.get_version.outputs.VERSION }}"

          Write-Host "Building installer with:"
          Write-Host "Source: $publishDir"
          Write-Host "Arch: $myArch"

          & $iscc setup.iss "/DPublishDir=$publishDir" "/DMyArch=$myArch" "/DMyAppVersion=$version" "/DRepoRoot=$repoRoot"

      - name: Rename Installer
        shell: pwsh
        run: |
          $arch = if ("${{ matrix.arch }}" -eq "win-x64") { "x64" } else { "x86" }
          Move-Item -Path "Output/CopyPaste_Setup_$arch.exe" -Destination "CopyPaste-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}-setup.exe"

      - name: Sign Installer
        if: env.PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $PWD 'signingCert.pfx'

          # Find latest x64 version of signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -like "*x64*" } | Sort-Object FullName -Descending | Select-Object -First 1

          & $signtool.FullName sign /f $pfxPath /p $env:PFX_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "CopyPaste-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}-setup.exe"

      - name: Release Files
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            CopyPaste-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}-portable.zip
            CopyPaste-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
